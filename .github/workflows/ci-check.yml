name: CI Status

on:
  # Re-runs whenever any of the three individual workflows complete
  workflow_run:
    workflows:
      - Type Check
      - Lint
      - Build
    types:
      - completed

jobs:
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest

    steps:
      - name: Check all workflow results
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // The workflows we require to pass
            const required = ["Type Check", "Lint", "Build"];

            // Fetch the most recent run of each required workflow
            // for the same SHA that triggered this workflow
            const sha = context.payload.workflow_run.head_sha;

            const results = await Promise.all(
              required.map(async (name) => {
                const runs = await github.rest.actions.listWorkflowRunsForRepo({
                  owner,
                  repo,
                  head_sha: sha,
                  per_page: 10,
                });

                const run = runs.data.workflow_runs.find(
                  (r) => r.name === name
                );

                return {
                  name,
                  conclusion: run?.conclusion ?? "pending",
                  status: run?.status ?? "unknown",
                };
              })
            );

            // Log each check result for visibility in the Actions log
            console.log("──────────────────────────────────");
            console.log("CI Check Results:");
            results.forEach(({ name, conclusion, status }) => {
              const icon =
                conclusion === "success" ? "✅" :
                conclusion === "failure" ? "❌" :
                conclusion === "cancelled" ? "⚠️" : "⏳";
              console.log(`  ${icon} ${name}: ${conclusion || status}`);
            });
            console.log("──────────────────────────────────");

            // Fail if any required check did not succeed
            const failed = results.filter(
              (r) => r.conclusion !== "success"
            );

            if (failed.length > 0) {
              const names = failed.map((r) => `${r.name} (${r.conclusion})`).join(", ");
              core.setFailed(
                `CI Status failed. The following checks did not pass: ${names}`
              );
            } else {
              console.log("✅ All checks passed. Safe to merge.");
            }