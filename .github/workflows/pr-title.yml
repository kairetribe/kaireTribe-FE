# PR Title Lint
# ─────────────
# Enforces conventional commit format on all pull request titles.
# This keeps the git history readable and enables automated changelogs
# in the future.
#
# Valid prefixes:
#   feat:     A new feature
#   fix:      A bug fix
#   chore:    Maintenance, dependencies, config changes
#   docs:     Documentation changes only
#   style:    Formatting, missing semicolons, etc (no logic change)
#   refactor: Code restructuring (no feature or bug fix)
#   perf:     Performance improvements
#   ci:       CI/CD pipeline changes
#   test:     Adding or updating tests
#   revert:   Reverting a previous commit
#
# Examples of valid PR titles:
#   feat: add Google OAuth sign-in
#   fix: resolve redirect loop on /admin
#   chore: upgrade Next.js to 16.2.1
#   refactor: extract NavLink into shared component

name: PR Title Lint

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional commit types
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            ci
            test
            revert
          # Require a scope e.g. feat(auth): ... — set to false to make optional
          requireScope: false
          # Minimum length of the subject (after the prefix)
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The PR title subject must start with an uppercase letter.
            Example: "feat: Add Google OAuth" not "feat: add google oauth"